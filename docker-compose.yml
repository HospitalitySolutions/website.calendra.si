services:
  website:
    container_name: calendra-website
    build:
      context: .
      args:
        VITE_SITE_URL: https://calendra.si
        VITE_APP_BASE_URL: ${VITE_APP_BASE_URL:-https://app.calendra.si}
        VITE_LINKEDIN_URL: ${VITE_LINKEDIN_URL:-}
        VITE_YOUTUBE_URL: ${VITE_YOUTUBE_URL:-}
        VITE_GOOGLE_PLAY_URL: ${VITE_GOOGLE_PLAY_URL:-}
        VITE_APP_STORE_URL: ${VITE_APP_STORE_URL:-}
    ports:
      - "${WEBSITE_PORT:-8080}:80"
    restart: unless-stopped
