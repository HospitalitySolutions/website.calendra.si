version: "3.9"

services:
  website:
    build:
      context: /opt/calendra-website
    container_name: calendra-website
    restart: unless-stopped
    expose:
      - "3000"

  app-frontend:
    build:
      context: /opt/calendra-staging/frontend
    container_name: calendra-app-frontend
    restart: unless-stopped
    expose:
      - "3000"
    depends_on:
      - app-backend
    environment:
      - VITE_API_URL=/api

  app-backend:
    build:
      context: /opt/calendra-staging/backend
    container_name: calendra-app-backend
    restart: unless-stopped
    expose:
      - "4000"
    environment:
      - PORT=4000
      - NODE_ENV=production

  caddy:
    image: caddy:2
    container_name: calendra-caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - website
      - app-frontend
      - app-backend
    volumes:
      - /opt/calendra-staging/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config

volumes:
  caddy_data:
  caddy_config: